quarkus.http.port=8081

# Metadados do Servidor
quarkus.mcp.server.server-info.name=Travel Booking Tools Service
quarkus.mcp.server.server-info.version=1.0.0

# Permite ver o JSON-RPC de cada transação
quarkus.mcp.server.traffic-logging.enabled=true
quarkus.mcp.server.traffic-logging.text-limit=2000

# Datasource PostgreSQL
quarkus.datasource.db-kind=postgresql
quarkus.datasource.username=${DB_USER:postgres}
quarkus.datasource.password=${DB_PASSWORD:postgres}
quarkus.datasource.jdbc.url=jdbc:postgresql://${DB_HOST:localhost}:5434/${DB_NAME:appdb}

# Hibernate ORM
quarkus.hibernate-orm.database.generation=validate

# MCP Auth — Shared secret entre travel-agency-ia e mcp-booking-server
# Vazio = bypass (dev local). Em produção, definir APP_MCP_SECRET.
app.mcp.secret=${APP_MCP_SECRET:}

# Google OAuth2 — Calendar
app.google.client-id=${GOOGLE_CLIENT_ID:}
app.google.client-secret=${GOOGLE_CLIENT_SECRET:}
app.google.redirect-uri=${APP_BASE_URL:http://localhost:8081}/connect/google/callback
app.base-url=${APP_BASE_URL:http://localhost:8081}

# Flyway
quarkus.flyway.migrate-at-start=true
%dev.quarkus.flyway.clean-at-start=true
%dev.quarkus.flyway.locations=classpath:db/migration,classpath:db/dev