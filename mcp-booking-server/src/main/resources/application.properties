quarkus.http.port=8081

# Metadados do Servidor
quarkus.mcp.server.server-info.name=Travel Booking Tools Service
quarkus.mcp.server.server-info.version=1.0.0

# Permite ver o JSON-RPC de cada transação
quarkus.mcp.server.traffic-logging.enabled=true
quarkus.mcp.server.traffic-logging.text-limit=2000

# Datasource PostgreSQL
quarkus.datasource.db-kind=postgresql
quarkus.datasource.username=${DB_USER:postgres}
quarkus.datasource.password=${DB_PASSWORD:postgres}
quarkus.datasource.jdbc.url=jdbc:postgresql://${DB_HOST:localhost}:5432/${DB_NAME:appdb}

# Hibernate ORM
quarkus.hibernate-orm.database.generation=validate

# Flyway
quarkus.flyway.migrate-at-start=true
%dev.quarkus.flyway.clean-at-start=true
%dev.quarkus.flyway.locations=classpath:db/migration,classpath:db/dev