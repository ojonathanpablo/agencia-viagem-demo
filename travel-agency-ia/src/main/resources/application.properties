# --- Seleção de providers ---
quarkus.langchain4j.chat-model.provider=ai-gemini
quarkus.langchain4j.embedding-model.provider=ollama

# --- Configuração do Gemini ---
quarkus.langchain4j.ai.gemini.api-key=${GEMINI_API_KEY}
quarkus.langchain4j.ai.gemini.chat-model.model-id=gemini-2.0-flash
quarkus.langchain4j.ai.gemini.chat-model.temperature=0.7
#quarkus.langchain4j.ai.gemini.chat-model.max-output-tokens=512
quarkus.langchain4j.ai.gemini.timeout=600s

# --- Configuração do Embedding Model ---
# --- Configuração do Ollama (apenas embedding) ---
quarkus.langchain4j.ollama.base-url=http://localhost:11434/
quarkus.langchain4j.ollama.embedding-model.model-id=nomic-embed-text

# --- Datasource ---
quarkus.datasource.db-kind=postgresql
quarkus.datasource.username=${DB_USER:postgres}
quarkus.datasource.password=${DB_PASSWORD:postgres}
quarkus.datasource.jdbc.url=jdbc:postgresql://${DB_HOST:localhost}:5432/${DB_NAME:appdb}

# --- Configuração do PgVector ---
# gemini-embedding-exp-03-07 produz vetores de 3072 dimensoes
quarkus.langchain4j.pgvector.register-vector-pg-extension=true
quarkus.langchain4j.pgvector.dimension=768
quarkus.langchain4j.pgvector.table=travel_embeddings
%dev.quarkus.langchain4j.pgvector.drop-table-first=true

# --- Configuração de Logging do LangChain4j ---
quarkus.langchain4j.log-requests=true
quarkus.langchain4j.log-responses=true

# --- Configuração de Guardrails ---
quarkus.langchain4j.guardrails.max-retries=3

# --- MCP Booking Server ---
quarkus.langchain4j.mcp.booking-server.transport-type=http
quarkus.langchain4j.mcp.booking-server.url=http://localhost:8081/mcp/sse
quarkus.langchain4j.mcp.booking-server.timeout=30s
quarkus.langchain4j.mcp.booking-server.log-requests=true
quarkus.langchain4j.mcp.booking-server.log-responses=true