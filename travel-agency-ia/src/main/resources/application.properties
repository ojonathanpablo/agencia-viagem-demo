# Configura a URL base do servidor Ollama.
quarkus.langchain4j.ollama.base-url=http://localhost:11434/

# Define o ID do modelo que o Langchain4j irï¿½ invocar no Ollama.
quarkus.langchain4j.ollama.chat-model.model-id=gpt-oss:20b

# Define um timeout para a chamada.
# Se o modelo demorar mais de 600s para responder, a chamada falharï¿½.
quarkus.langchain4j.ollama.timeout=600s

# --- Configuraï¿½ï¿½o do Embedding Model ---
quarkus.langchain4j.ollama.embedding-model.model-id=nomic-embed-text

# --- Configuraï¿½ï¿½o do PgVector ---
# A dimensï¿½o do vetor DEVE corresponder ï¿½ do seu EmbeddingModel. O modelo 'nomic-embed-text' usa vetores de 768 dimensï¿½es.
quarkus.langchain4j.pgvector.register-vector-pg-extension=true
quarkus.langchain4j.pgvector.dimension=768
quarkus.langchain4j.pgvector.table=travel_embeddings
quarkus.langchain4j.pgvector.drop-table-first=true


# --- Configuraï¿½ï¿½o de Logging do LangChain4j ---
# Loga a requisiï¿½ï¿½o completa enviada para o LLM (incluindo o manifesto de Tools)
quarkus.langchain4j.log-requests=true

# Loga a resposta completa recebida do LLM (incluindo a chamada de Tool)
quarkus.langchain4j.log-responses=true

# --- ConfiguraĂ§Ă£o de Guardrails ---
# NĂºmero mĂ¡ximo de tentativas de reprompt antes de lanĂ§ar OutputGuardrailException
quarkus.langchain4j.guardrails.max-retries=3

# Define um cliente chamado "booking-server"
quarkus.langchain4j.mcp.booking-server.transport-type=http
quarkus.langchain4j.mcp.booking-server.url=http://localhost:8081/mcp/sse/

# Timeout generoso para garantir que o handshake funcione
quarkus.langchain4j.mcp.booking-server.timeout=30s

# Logs para ver o processo acontecer
quarkus.langchain4j.mcp.booking-server.log-requests=true
quarkus.langchain4j.mcp.booking-server.log-responses=true

#  Quando o AI Service ver que o método retorna um objeto Java, gera o schema JSON automaticamente e manda pro LLM
quarkus.langchain4j.ollama.chat-model.supported-capabilities=response-format-json-schema